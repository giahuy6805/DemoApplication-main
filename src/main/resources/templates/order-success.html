<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt hàng thành công | TechHub Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
<div class="max-w-md w-full p-10 text-center bg-white rounded-[3rem] shadow-xl shadow-gray-200/50 border border-gray-100 mx-4">
    <div class="w-24 h-24 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto mb-8">
        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
    </div>

    <h1 class="text-3xl font-extrabold text-black mb-4 tracking-tighter">Đặt hàng thành công!</h1>

    <p class="text-gray-500 mb-2 font-medium">Cảm ơn bạn đã tin tưởng TechHub.</p>
    <p class="text-sm text-gray-400 mb-8">
        Mã đơn hàng: <span class="text-blue-600 font-bold" th:text="${orderId}">#TH123456</span>
    </p>

    <div class="space-y-4">
        <a href="/" class="block w-full bg-black text-white font-extrabold py-5 rounded-2xl hover:bg-gray-800 transition-all text-sm tracking-widest uppercase shadow-lg shadow-gray-200">
            Tiếp tục mua sắm
        </a>
        <p class="text-[11px] text-gray-400 uppercase tracking-widest font-bold">TechHub Premium Store</p>
    </div>
</div>
</body>
</html>
