<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | TechHub Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-effect { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

<div class="w-full max-w-md p-8 mx-4">
    <div class="text-center mb-10">
        <a href="/"><h1 class="text-3xl font-extrabold text-black tracking-tighter">TechHub.</h1></a>
        <p class="text-gray-500 text-sm mt-2 font-medium">Đăng nhập để trải nghiệm công nghệ mới nhất.</p>
    </div>

    <div class="bg-white p-10 rounded-[2.5rem] shadow-xl shadow-gray-200/50 border border-gray-100">
        <form th:action="@{/login}" method="post" class="space-y-6">

            <div th:if="${param.error}" class="text-red-500 text-xs font-bold text-center bg-red-50 p-3 rounded-xl border border-red-100 mb-4">
                Tài khoản hoặc mật khẩu không chính xác.
            </div>

            <div>
                <label class="block text-[10px] font-extrabold text-gray-400 uppercase tracking-[0.2em] mb-2 ml-1">Email đăng nhập</label>
                <input type="text" name="email" required
                       class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-600/20 focus:border-blue-600 transition-all text-sm font-medium"
                       placeholder="Nhập email của bạn">
            </div>

            <div>
                <label class="block text-[10px] font-extrabold text-gray-400 uppercase tracking-[0.2em] mb-2 ml-1">Mật khẩu</label>
                <input type="password" name="password" required
                       class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-600/20 focus:border-blue-600 transition-all text-sm font-medium"
                       placeholder="••••••••">
            </div>

            <div class="flex items-center justify-between px-1">
                <label class="flex items-center text-xs text-gray-500 cursor-pointer">
                    <input type="checkbox" class="rounded border-gray-300 mr-2"> Ghi nhớ tôi
                </label>
                <a th:href="@{/forgot-password}" class="text-xs font-bold text-blue-600 hover:text-blue-700">Quên mật khẩu?</a>
            </div>

            <button type="submit"
                    class="w-full bg-black text-white font-extrabold py-5 rounded-2xl hover:bg-gray-800 transform active:scale-[0.98] transition-all shadow-lg shadow-gray-200 text-sm tracking-widest uppercase">
                Đăng nhập ngay
            </button>
        </form>

        <div class="mt-8 pt-8 border-t border-gray-50 text-center">
            <p class="text-sm text-gray-500 font-medium">
                Chưa có tài khoản?
                <a href="/register" class="text-black font-extrabold border-b-2 border-black pb-0.5 hover:text-blue-600 hover:border-blue-600 transition-all">Tạo tài khoản mới</a>
            </p>
        </div>
    </div>

    <div class="mt-10 text-center">
        <a href="/" class="text-xs font-bold text-gray-400 hover:text-black transition-all uppercase tracking-widest">← Quay lại cửa hàng</a>
    </div>
</div>

</body>
</html>
