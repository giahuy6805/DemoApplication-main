<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quên mật khẩu - TechHub.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-6">

<div class="max-w-md w-full bg-white rounded-3xl shadow-xl shadow-gray-200/50 p-10 border border-gray-100">
    <div class="text-center mb-10">
        <a href="/"><h1 class="text-3xl font-bold text-black tracking-tighter">TechHub.</h1></a>
        <p class="text-gray-500 mt-2 text-sm">Khôi phục quyền truy cập tài khoản của bạn</p>
    </div>

    <div th:if="${error}" class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 text-sm animate-pulse">
        <span th:text="${error}"></span>
    </div>

    <form th:action="@{/forgot-password}" method="POST" class="space-y-6">
        <div>
            <label for="email" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Địa chỉ Email đã đăng ký</label>
            <input type="email" id="email" name="email" required
                   class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-black focus:border-transparent outline-none transition-all placeholder-gray-400"
                   placeholder="example@gmail.com">
        </div>

        <button type="submit"
                class="w-full bg-black text-white py-4 rounded-xl font-bold text-sm hover:bg-gray-800 transform transition-all active:scale-[0.98] shadow-lg shadow-gray-900/10">
            GỬI MẬT KHẨU MỚI
        </button>
    </form>

    <div class="mt-8 pt-6 border-t border-gray-100 text-center">
        <p class="text-sm text-gray-500">
            Bạn đã nhớ ra mật khẩu?
            <a href="/login" class="text-black font-bold hover:underline ml-1">Đăng nhập ngay</a>
        </p>
    </div>
</div>

</body>
</html>
