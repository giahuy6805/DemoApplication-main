<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo tài khoản | TechHub Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen py-12">

<div class="w-full max-w-md p-8 mx-4">
    <div class="text-center mb-10">
        <a href="/"><h1 class="text-3xl font-extrabold text-black tracking-tighter">TechHub.</h1></a>
        <p class="text-gray-500 text-sm mt-2 font-medium">Bắt đầu hành trình công nghệ của bạn.</p>
    </div>

    <div class="bg-white p-10 rounded-[2.5rem] shadow-xl shadow-gray-200/50 border border-gray-100">
        <form th:action="@{/register}" th:object="${user}" method="post" class="space-y-5">

            <div>
                <label class="block text-[10px] font-extrabold text-gray-400 uppercase tracking-[0.2em] mb-2 ml-1">Họ và tên</label>
                <input type="text" th:field="*{fullName}" required
                       class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-600/20 focus:border-blue-600 transition-all text-sm font-medium"
                       placeholder="VD: Nguyễn Văn Huy">
            </div>

            <div>
                <label class="block text-[10px] font-extrabold text-gray-400 uppercase tracking-[0.2em] mb-2 ml-1">Email</label>
                <input type="email" th:field="*{email}" required
                       class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-600/20 focus:border-blue-600 transition-all text-sm font-medium"
                       placeholder="huy@example.com">
            </div>

            <div>
                <label class="block text-[10px] font-extrabold text-gray-400 uppercase tracking-[0.2em] mb-2 ml-1">Mật khẩu</label>
                <input type="password" th:field="*{password}" required
                       class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-600/20 focus:border-blue-600 transition-all text-sm font-medium"
                       placeholder="••••••••">
            </div>

            <div class="text-[11px] text-gray-400 px-1 leading-relaxed">
                Bằng việc đăng ký, bạn đồng ý với <a href="#" class="underline">Điều khoản dịch vụ</a> của chúng tôi.
            </div>

            <button type="submit"
                    class="w-full bg-black text-white font-extrabold py-5 rounded-2xl hover:bg-gray-800 transform active:scale-[0.98] transition-all shadow-lg shadow-gray-200 text-sm tracking-widest uppercase">
                Tạo tài khoản ngay
            </button>
        </form>

        <div class="mt-8 pt-8 border-t border-gray-50 text-center">
            <p class="text-sm text-gray-500 font-medium">
                Đã có tài khoản?
                <a th:href="@{/login}" class="text-black font-extrabold border-b-2 border-black pb-0.5 hover:text-blue-600 hover:border-blue-600 transition-all">Đăng nhập</a>
            </p>
        </div>
    </div>

    <div class="mt-10 text-center">
        <a href="/" class="text-xs font-bold text-gray-400 hover:text-black transition-all uppercase tracking-widest">← Quay lại cửa hàng</a>
    </div>
</div>

</body>
</html>
