<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý tài khoản | Lofi Tech Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/admin-dashboard.css}">

    <style>
        /* CSS bổ sung để làm đẹp bảng User */
        .user-avatar-circle { width: 40px; height: 40px; border-radius: 50%; background: #eef0f7; color: #4e73df; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .role-select-custom { border: 1px solid #eef0f7; border-radius: 8px; padding: 4px 12px; font-size: 0.85rem; outline: none; transition: 0.2s; cursor: pointer; }
        .role-admin { background-color: #fff1f0; color: #eb2f96; border-color: #ffadd2; }
        .role-customer { background-color: #f6ffed; color: #52c41a; border-color: #b7eb8f; }
        .btn-delete-user { color: #ea5455; background: rgba(234, 84, 85, 0.1); border: none; padding: 6px 10px; border-radius: 8px; transition: 0.2s; }
        .btn-delete-user:hover { background: #ea5455; color: #fff; }
    </style>
</head>

<body>

<aside id="sidebar">
    <a class="sidebar-brand" href="/admin/dashboard">
        <div class="brand-icon"><i class="bi bi-cpu-fill"></i></div>
        <div class="brand-text">Lofi Tech <span>Admin Panel</span></div>
    </a>
    <ul class="sidebar-nav">
        <li><div class="sidebar-label">Menu chính</div></li>
        <li class="nav-item"><a th:href="@{/admin/dashboard}"><i class="bi bi-grid-1x2-fill"></i><span>Tổng quan</span></a></li>
        <li class="nav-item"><a th:href="@{/admin/products/laptops}"><i class="bi bi-laptop"></i><span>Quản lý Laptop</span></a></li>
        <li class="nav-item"><a th:href="@{/admin/products/phones}"><i class="bi bi-phone"></i><span>Quản lý Điện thoại</span></a></li>
        <li><div class="sidebar-label">Vận hành</div></li>
        <li class="nav-item"><a th:href="@{/admin/orders}"><i class="bi bi-cart4"></i><span>Đơn hàng</span></a></li>
        <li class="nav-item"><a th:href="@{/admin/users}" class="active"><i class="bi bi-people-fill"></i><span>Quản lý tài khoản</span></a></li>
        <li><div class="sidebar-label">Hệ thống</div></li>
        <li class="nav-item"><a th:href="@{/logout}" class="text-danger"><i class="bi bi-box-arrow-right"></i><span>Đăng xuất</span></a></li>
    </ul>
</aside>

<div id="main-wrapper">
    <header id="topbar">
        <button id="sidebarToggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
        <div class="topbar-search d-none d-sm-block">
            <i class="bi bi-search"></i>
            <input type="text" placeholder="Tìm kiếm khách hàng...">
        </div>
        <div class="topbar-actions">
            <div class="admin-profile d-flex align-items-center gap-2">
                <img src="https://api.dicebear.com/8.x/avataaars/svg?seed=admin" style="width: 32px; border-radius: 50%;">
                <strong th:text="${session.loggedInUser != null ? session.loggedInUser.fullName : 'Admin'}" style="font-size: 0.85rem;">Admin</strong>
            </div>
        </div>
    </header>

    <main id="content">
        <div class="page-header mb-4 anim">
            <h1>Quản lý tài khoản</h1>
            <div class="section-title-divider"></div>
        </div>

        <div class="dash-card anim anim-d1">
            <div class="dash-card-header">
                <h6><i class="bi bi-table me-2" style="color:var(--primary)"></i>Danh sách thành viên</h6>
            </div>
            <div class="dash-card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" style="border-collapse: separate; border-spacing: 0;">
                        <thead style="background: #f8f9fa;">
                        <tr>
                            <th class="ps-4 py-3 text-muted small uppercase">ID</th>
                            <th class="py-3 text-muted small uppercase">Người dùng</th>
                            <th class="py-3 text-muted small uppercase">Email</th>
                            <th class="py-3 text-muted small uppercase">Quyền hạn</th>
                            <th class="text-center py-3 text-muted small uppercase">Hành động</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="u : ${users}">
                            <td class="ps-4 fw-bold text-muted" th:text="${u.id}">1</td>
                            <td>
                                <div class="d-flex align-items-center gap-3">
                                    <div class="user-avatar-circle" th:text="${#strings.substring(u.fullName, 0, 1)}">H</div>
                                    <div class="fw-semibold text-dark" th:text="${u.fullName}">Nguyễn Huy</div>
                                </div>
                            </td>
                            <td th:text="${u.email}">huy@gmail.com</td>
                            <td>
                                <form th:action="@{/admin/users/update-role}" method="POST">
                                    <input type="hidden" name="id" th:value="${u.id}">
                                    <select name="role" onchange="this.form.submit()"
                                            class="role-select-custom"
                                            th:classappend="${u.role == 'ADMIN' ? 'role-admin' : 'role-customer'}">
                                        <option value="ADMIN" th:selected="${u.role == 'ADMIN'}">ADMIN</option>
                                        <option value="CUSTOMER" th:selected="${u.role == 'CUSTOMER'}">CUSTOMER</option>
                                    </select>
                                </form>
                            </td>
                            <td class="text-center">
                                <a th:href="@{'/admin/users/delete/' + ${u.id}}"
                                   onclick="return confirm('Xóa tài khoản này?')"
                                   class="btn-delete-user">
                                    <i class="bi bi-trash3-fill"></i>
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
